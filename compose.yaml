services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-imagecdn}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-imagecdn}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOAD_DIR: /data/uploads
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads:/data/uploads
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:3000/ready');process.exit(r.ok?0:1)"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imagecdn}
      POSTGRES_USER: ${POSTGRES_USER:-imagecdn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  uploads:
